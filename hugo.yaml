baseURL: "https://pick.informationhot.kr/"
languageCode: "ko"
title: "내 차 찾기"
theme: "blowfish"
defaultContentLanguage: "ko"
enableRobotsTXT: true
pagination:
  pagerSize: 12
summaryLength: 150
taxonomies:
  tag: "tags"
  category: "categories"
params:
  colorScheme: "slate"
  defaultAppearance: "dark"
  autoSwitchAppearance: false
  header:
    disableLanguageSwitcher: true
    layout: "basic"
    showTitle: true
  footer:
    showCopyright: true
    showThemeAttribution: false
    showScrollToTop: true
  homepage:
    layout: "page"
    showRecent: true
    showRecentItems: 12
    cardView: false
  article:
    showWordCount: false
    showReadingTime: false
    showDate: true
    showAuthor: false
    showBreadcrumbs: true
    showTableOfContents: true
  description: "신혼부부·출퇴근·첫차 등 상황별 최적 차량 추천"
  mainSections:
    - "posts"
menus:
  main:
    - name: 글목록
      pageRef: posts
      weight: 10
    - name: 검색
      pageRef: search
      weight: 20
